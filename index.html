<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Mastery Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        :root { --wood: #27ae60; --fire: #e74c3c; --earth: #f1c40f; --metal: #bdc3c7; --water: #2c3e50; }
        body { background: #f8fafc; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { max-width: 500px; width: 100%; background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        #result { display: none; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
        .p-box { height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; color: #fff; font-weight: 800; font-size: 18px; }
        .p-box span { font-size: 10px; font-weight: 400; opacity: 0.8; margin-bottom: 2px; }
        .master { outline: 3px solid #000; outline-offset: -3px; }
        .god { font-size: 10px; font-weight: 700; color: #94a3b8; margin-top: 5px; margin-bottom: 12px; text-transform: uppercase; }
        .wood { background: var(--wood); } .fire { background: var(--fire); } .earth { background: var(--earth); color: #333 !important; } .metal { background: var(--metal); color: #333 !important; } .water { background: var(--water); }
    </style>
</head>
<body>

<div id="app">
    <h2 style="text-align:center; margin-top:0;">Bazi Destiny</h2>
    <div class="input-group">
        <label>생년월일 및 태어난 시간</label>
        <input type="datetime-local" id="user-dt">
    </div>
    <div class="input-group">
        <label>경도 (기본값: 서울 127.0 / 미국 뉴욕 -74.0)</label>
        <input type="number" id="user-lon" value="127.0" step="0.1">
    </div>
    <button id="calc-btn">사주 보기</button>

    <div id="result">
        <div class="grid">
            <div style="font-size:9px; color:#94a3b8;">시(Hour)</div><div style="font-size:9px; color:#94a3b8;">일(Day)</div><div style="font-size:9px; color:#94a3b8;">월(Month)</div><div style="font-size:9px; color:#94a3b8;">년(Year)</div>
            
            <div id="h1" class="p-box"></div><div id="d1" class="p-box master"></div><div id="m1" class="p-box"></div><div id="y1" class="p-box"></div>
            <div id="sh1" class="god"></div><div class="god" style="color:#000;">나(SELF)</div><div id="sm1" class="god"></div><div id="sy1" class="god"></div>
            
            <div id="h2" class="p-box"></div><div id="d2" class="p-box"></div><div id="m2" class="p-box"></div><div id="y2" class="p-box"></div>
            <div id="sh2" class="god"></div><div id="sd2" class="god"></div><div id="sm2" class="god"></div><div id="sy2" class="god"></div>
        </div>
    </div>
</div>

<script>
// 기초 데이터 (한자: [영어설명, 색상클래스, 인덱스])
const MAP = {
    '甲':['Wood','wood',0],'乙':['Wood','wood',1],'丙':['Fire','fire',2],'丁':['Fire','fire',3],'戊':['Earth','earth',4],'己':['Earth','earth',5],'庚':['Metal','metal',6],'辛':['Metal','metal',7],'壬':['Water','water',8],'癸':['Water','water',9],
    '寅':['Wood','wood',0],'卯':['Wood','wood',1],'巳':['Fire','fire',2],'午':['Fire','fire',3],'辰':['Earth','earth',4],'戌':['Earth','earth',4],'丑':['Earth','earth',5],'未':['Earth','earth',5],'申':['Metal','metal',6],'酉':['Metal','metal',7],'亥':['Water','water',8],'子':['Water','water',9]
};
const TEN_STARS = ['비견','겁재','식신','상관','편재','정재','편관','정관','편인','정인'];

// 십성 계산 함수 (일간 기준)
function calculateGod(me, target) {
    if (!MAP[me] || !MAP[target]) return "";
    let diff = MAP[target][2] - MAP[me][2];
    if (diff < 0) diff += 10;
    return TEN_STARS[diff];
}

document.getElementById('calc-btn').onclick = function() {
    const dtVal = document.getElementById('user-dt').value;
    if(!dtVal) return alert("날짜를 선택해주세요.");
    const lon = parseFloat(document.getElementById('user-lon').value);

    // 1. 시간 보정 (경도 기준 진태양시 계산)
    const dateObj = new Date(new Date(dtVal).getTime() + (lon - 135) * 4 * 60000);
    
    // 2. 사주 한자 가져오기 (가장 기초적인 함수만 사용)
    const solar = Solar.fromDate(dateObj);
    const lunar = solar.getLunar();
    
    const yG = lunar.getYearGan(), yZ = lunar.getYearZhi();
    const mG = lunar.getMonthGan(), mZ = lunar.getMonthZhi();
    const dG = lunar.getDayGan(), dZ = lunar.getDayZhi();
    const hG = lunar.getTimeGan(), hZ = lunar.getTimeZhi();

    // 3. 화면에 그리기
    draw('y1', 'sy1', yG, dG); draw('m1', 'sm1', mG, dG); draw('d1', '', dG, dG); draw('h1', 'sh1', hG, dG);
    draw('y2', 'sy2', yZ, dG); draw('m2', 'sm2', mZ, dG); draw('d2', 'sd2', dZ, dG); draw('h2', 'sh2', hZ, dG);

    document.getElementById('result').style.display = 'block';
};

function draw(id, sid, han, me) {
    const info = MAP[han]; if(!info) return;
    const el = document.getElementById(id);
    if(el) {
        el.className = 'p-box ' + info[1] + (id==='d1'?' master':'');
        el.innerHTML = `<span>${info[0]}</span>${han}`;
    }
    if(sid) {
        document.getElementById(sid).innerText = calculateGod(me, han);
    }
}
</script>

</body>
</html>
