<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Master Pro - Live Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --wood: #27ae60; --fire: #e74c3c; --earth: #f1c40f; --metal: #95a5a6; --water: #2c3e50; 
            --bg: #f1f2f6; --card-bg: #ffffff;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 850px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 입력 영역 */
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 20px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, button { padding: 12px; border-radius: 12px; border: 1px solid #ddd; }
        button { background: #2f3542; color: #fff; cursor: pointer; border: none; font-weight: bold; flex: 1; }
        button:hover { background: #57606f; }

        /* 사주 원국 */
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .column { display: flex; flex-direction: column; gap: 8px; text-align: center; }
        .ss-label { font-size: 13px; font-weight: 800; color: #57606f; height: 20px; }
        .cell { height: 80px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; font-weight: 900; }
        .master { border: 4px solid #2f3542; }
        
        /* 상세 정보 */
        .sub-box { background: #fff; border: 1px solid #eee; padding: 10px 5px; border-radius: 15px; font-size: 11px; min-height: 180px; display: flex; flex-direction: column; gap: 4px; }
        .un-12 { color: #2f3542; font-weight: 900; font-size: 13px; margin: 3px 0; }
        .tag-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; }
        .tag { padding: 2px 5px; border-radius: 4px; font-size: 9px; color: #fff; font-weight: bold; }
        .t-union { background: #27ae60; } .t-clash { background: #e74c3c; } .t-noble { background: #d4af37; } .t-spec { background: #34495e; }

        /* 운세 리스트 */
        .luck-section { margin-top: 30px; }
        .luck-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px; border-left: 4px solid #2f3542; padding-left: 10px; }
        .luck-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .luck-card { min-width: 75px; background: #fff; border: 1px solid #eee; padding: 12px 8px; border-radius: 15px; text-align: center; flex-shrink: 0; }
        .l-age { font-size: 11px; color: #a4b0be; }
        .l-gz { font-size: 18px; font-weight: 900; margin: 4px 0; }

        .wood { background: var(--wood); } .fire { background: var(--fire); } .earth { background: var(--earth); color: #333 !important; } .metal { background: var(--metal); } .water { background: var(--water); }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <h2 style="text-align:center;">BAZI MASTER PRO</h2>
    
    <div class="input-group">
        <div class="row">
            <input type="datetime-local" id="birth-dt" style="flex:2;">
            <select id="gender" style="flex:1;"><option value="M">Male</option><option value="F">Female</option></select>
        </div>
        <div class="row" style="font-size: 12px;">
            <label><input type="checkbox" id="no-time"> Unknown Time</label>
            <label style="margin-left:10px;">자시: <select id="jasi"><option value="Y">야자시</option><option value="N">조자시</select></label>
        </div>
        <button onclick="calculate()">RUN DEEP ANALYSIS</button>
    </div>

    <div id="result-view" style="display:none;">
        <div class="bazi-grid">
            <div class="column"><div id="h-ss" class="ss-label"></div><div id="h-gan" class="cell"></div><div id="h-zhi" class="cell"></div><div id="h-sub" class="sub-box"></div></div>
            <div class="column"><div class="ss-label">ME</div><div id="d-gan" class="cell master"></div><div id="d-zhi" class="cell"></div><div id="d-sub" class="sub-box"></div></div>
            <div class="column"><div id="m-ss" class="ss-label"></div><div id="m-gan" class="cell"></div><div id="m-zhi" class="cell"></div><div id="m-sub" class="sub-box"></div></div>
            <div class="column"><div id="y-ss" class="ss-label"></div><div id="y-gan" class="cell"></div><div id="y-zhi" class="cell"></div><div id="y-sub" class="sub-box"></div></div>
        </div>

        <div class="luck-section">
            <div class="luck-title">Major Luck (대운)</div>
            <div id="daewun-row" class="luck-scroll"></div>
            <div class="luck-title">Annual Luck (세운)</div>
            <div id="seun-row" class="luck-scroll"></div>
        </div>
    </div>
    <button onclick="saveImg()" style="width:100%; background:#27ae60; margin-top:20px;">Save as Image</button>
</div>

<script>
const GANS = "甲乙丙丁戊己庚辛壬癸", ZHIS = "子丑寅卯辰巳午未申酉戌亥";
const COLORS = {'甲':'wood','乙':'wood','寅':'wood','卯':'wood','丙':'fire','丁':'fire','巳':'fire','午':'fire','戊':'earth','己':'earth','辰':'earth','戌':'earth','丑':'earth','未':'earth','庚':'metal','辛':'metal','申':'metal','酉':'metal','壬':'water','癸':'water','亥':'water','子':'water'};
const TWELVE_MAP = {'甲':{'亥':'장생','戌':'양','酉':'태','申':'절','未':'묘','午':'사','巳':'병','辰':'쇠','卯':'제왕','寅':'건록','丑':'관대','子':'목욕'},'乙':{'午':'장생','巳':'양','辰':'태','卯':'절','寅':'묘','丑':'사','子':'병','亥':'쇠','戌':'제왕','酉':'건록','申':'관대','未':'목욕'},'丙':{'寅':'장생','丑':'양','子':'태','亥':'절','戌':'묘','酉':'사','申':'병','未':'쇠','午':'제왕','巳':'건록','辰':'관대','卯':'목욕'},'丁':{'酉':'장생','申':'양','未':'태','午':'절','巳':'묘','辰':'사','卯':'병','寅':'쇠','丑':'제왕','子':'건록','亥':'관대','戌':'목욕'},'戊':{'寅':'장생','丑':'양','子':'태','亥':'절','戌':'묘','酉':'사','申':'병','未':'쇠','午':'제왕','巳':'건록','辰':'관대','卯':'목욕'},'己':{'酉':'장생','申':'양','未':'태','午':'절','巳':'묘','辰':'사','卯':'병','寅':'쇠','丑':'제왕','子':'건록','亥':'관대','戌':'목욕'},'庚':{'巳':'장생','辰':'양','卯':'태','寅':'절','丑':'묘','子':'사','亥':'병','戌':'쇠','酉':'제왕','申':'건록','未':'관대','午':'목욕'},'辛':{'子':'장생','亥':'양','戌':'태','酉':'절','申':'묘','未':'사','午':'병','巳':'쇠','辰':'제왕','卯':'건록','寅':'관대','丑':'목욕'},'壬':{'申':'장생','未':'양','午':'태','巳':'절','辰':'묘','卯':'사','寅':'병','丑':'쇠','子':'제왕','亥':'건록','戌':'관대','酉':'목욕'},'癸':{'卯':'장생','寅':'양','丑':'태','子':'절','亥':'묘','戌':'사','酉':'병','申':'쇠','未':'제왕','午':'건록','巳':'관대','辰':'목욕'}};

let mainData = null, monthData = null;

// [데이터 로드]
async function load() {
    mainData = await (await fetch('https://raw.githubusercontent.com/bongjae0624-ui/bazi-Calculator/refs/heads/main/bazi_data_1900_2100_with_terms.json')).json();
    monthData = await (await fetch('https://raw.githubusercontent.com/bongjae0624-ui/bazi-Calculator/refs/heads/main/monthly_data.json')).json();
    console.log("Data Loaded Successfully");
}
load();

function calculate() {
    if(!mainData) return alert("데이터 로딩 중입니다.");
    const val = document.getElementById('birth-dt').value;
    if(!val) return alert("생년월일을 입력하세요.");

    let date = new Date(val);
    let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
    
    // 야자시 처리
    if(date.getHours() >= 23 && document.getElementById('jasi').value === 'Y') {
        date = new Date(date.getTime() + 86400000);
        year = date.getFullYear(); month = date.getMonth() + 1; day = date.getDate();
    }

    const dayInfo = mainData[year][month][day].split('|');
    const meGan = dayInfo[2][0], meZhi = dayInfo[2][1];
    const hourP = document.getElementById('no-time').checked ? "??" : getHourP(meGan, date.getHours());

    const pillars = [dayInfo[0], dayInfo[1], dayInfo[2], hourP]; // 년, 월, 일, 시
    const ids = ['y','m','d','h'];
    
    pillars.reverse().forEach((p, i) => {
        updateCell(ids[i], p, pillars, meGan, meZhi);
    });

    renderLucks(meGan, meZhi, dayInfo[0], year);
    document.getElementById('result-view').style.display = 'block';
}

function updateCell(id, p, all, meGan, meZhi) {
    if(p === "??") { 
        document.getElementById(`${id}-gan`).innerText = "?"; 
        document.getElementById(`${id}-gan`).className = "cell unknown";
        return; 
    }
    const gan = p[0], zhi = p[1];
    document.getElementById(`${id}-gan`).innerText = gan;
    document.getElementById(`${id}-gan`).className = `cell ${COLORS[gan]} ${id==='d'?'master':''}`;
    document.getElementById(`${id}-zhi`).innerText = zhi;
    document.getElementById(`${id}-zhi`).className = `cell ${COLORS[zhi]}`;
    document.getElementById(`${id}-ss`).innerText = (id==='d'?'ME':getSS(meGan, gan));

    // 상세 정보 (12운성, 합충 등)
    const sub = document.getElementById(`${id}-sub`);
    sub.innerHTML = `
        <div class="un-12">${TWELVE_MAP[meGan][zhi] || ""}</div>
        <div class="tag-group">${getInter(zhi, all)}</div>
    `;
}

function getHourP(meG, hr) {
    let zIdx = Math.floor((hr + 1) / 2) % 12;
    const start = {'甲':0,'己':0,'乙':2,'庚':2,'丙':4,'辛':4,'丁':6,'壬':6,'戊':8,'癸':8};
    return GANS[(start[meG] + zIdx) % 10] + ZHIS[zIdx];
}

function getSS(me, tg) {
    const mI = GANS.indexOf(me), tI = GANS.indexOf(tg);
    const diff = (Math.floor(tI/2) - Math.floor(mI/2) + 5) % 5;
    const names = [["비견","겁재"],["식신","상관"],["편재","정재"],["편관","정관"],["편인","정인"]];
    return names[diff][(mI%2===tI%2)?0:1];
}

function getInter(zhi, all) {
    let tags = "";
    const allZ = all.map(p => p[1]);
    const clash = {'子':'午','午':'子','丑':'未','未':'丑','寅':'申','申':'寅','卯':'酉','酉':'卯','辰':'戌','戌':'辰','巳':'亥','亥':'巳'};
    if(allZ.includes(clash[zhi])) tags += `<span class="tag t-clash">충(${clash[zhi]})</span>`;
    return tags;
}

function renderLucks(meGan, meZhi, yearP, bYear) {
    const dwRow = document.getElementById('daewun-row'), seRow = document.getElementById('seun-row');
    dwRow.innerHTML = seRow.innerHTML = "";

    // 대운 & 세운 간단 생성 로직 (샘플)
    for(let i=1; i<=10; i++) {
        dwRow.innerHTML += `<div class="luck-card"><div class="l-age">${i*10}</div><div class="l-gz">甲子</div></div>`;
    }
    for(let i=0; i<20; i++) {
        const y = bYear + i;
        seRow.innerHTML += `<div class="luck-card"><div class="l-age">${y}</div><div class="l-gz">丙午</div></div>`;
    }
}

function saveImg() {
    html2canvas(document.getElementById("main-card")).then(canvas => {
        const a = document.createElement('a'); a.download = 'bazi.png'; a.href = canvas.toDataURL(); a.click();
    });
}
</script>
</body>
</html>
