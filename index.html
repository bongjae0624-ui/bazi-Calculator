<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bazi Master - GitHub Cloud Version</title>
    <style>
        /* (생략: 이전과 동일한 스타일을 사용하시거나, 디자인을 자유롭게 수정하세요) */
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 30px auto; }
        .cell { height: 80px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 1px solid #ddd; }
        .label { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <h2>BAZI MASTER (Cloud Data)</h2>
    <input type="datetime-local" id="birth-dt">
    <button onclick="analyze()">분석하기</button>

    <div id="result" style="display:none;">
        <div class="bazi-grid">
            <div class="label">시</div><div class="label">일</div><div class="label">월</div><div class="label">년</div>
            <div id="h-gan" class="cell"></div><div id="d-gan" class="cell"></div><div id="m-gan" class="cell"></div><div id="y-gan" class="cell"></div>
            <div id="h-zhi" class="cell"></div><div id="d-zhi" class="cell"></div><div id="m-zhi" class="cell"></div><div id="y-zhi" class="cell"></div>
        </div>
    </div>

<script>
let baziDatabase = null;

// 1. 페이지 로드 시 GitHub에서 데이터 미리 가져오기
async function loadData() {
    // ⚠️ 아래 주소를 본인의 GitHub Raw 주소로 바꾸세요!
    const RAW_URL = 'https://raw.githubusercontent.com/bongjae0624-ui/bazi-Calculator/main/bazi_data_1900_2100.json';
    try {
        const res = await fetch(RAW_URL);
        baziDatabase = await res.json();
        console.log("✅ 데이터 로드 완료");
    } catch (e) {
        console.error("❌ 데이터 로드 실패", e);
    }
}
loadData();

// 2. 시주(Hour Pillar) 계산기 (시두법 공식)
function getHourPillar(dayGan, hour) {
    const gans = "甲乙丙丁戊己庚辛壬癸";
    const zhis = "子丑寅卯辰巳午未申酉戌亥";
    
    // 시간 -> 지지 인덱스 (23시~01시는 자시)
    let zhiIdx = Math.floor((hour + 1) / 2) % 12;
    
    // 일간에 따른 시두법 공식
    const startGanMap = { '甲': 0, '己': 0, '乙': 2, '庚': 2, '丙': 4, '辛': 4, '丁': 6, '壬': 6, '戊': 8, '癸': 8 };
    let ganIdx = (startGanMap[dayGan] + zhiIdx) % 10;
    
    return gans[ganIdx] + zhis[zhiIdx];
}

async function analyze() {
    if (!baziDatabase) return alert("데이터를 불러오는 중입니다. 잠시만 기다려주세요.");
    
    const dt = new Date(document.getElementById('birth-dt').value);
    const y = dt.getFullYear(), m = dt.getMonth() + 1, d = dt.getDate(), h = dt.getHours();

    try {
        // GitHub 데이터에서 년|월|일 추출
        const rawPillars = baziDatabase[y][m][d]; // "庚午|辛巳|庚午"
        const [yP, mP, dP] = rawPillars.split('|');
        
        // 시주 계산
        const hP = getHourPillar(dP[0], h);

        // 화면에 뿌리기
        const show = (id, text) => document.getElementById(id).innerText = text;
        show('y-gan', yP[0]); show('y-zhi', yP[1]);
        show('m-gan', mP[0]); show('m-zhi', mP[1]);
        show('d-gan', dP[0]); show('d-zhi', dP[1]);
        show('h-gan', hP[0]); show('h-zhi', hP[1]);

        document.getElementById('result').style.display = 'block';
    } catch (e) {
        alert("해당 날짜의 데이터가 없습니다.");
    }
}
</script>
</body>
</html>
