<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Master Pro - Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --wood: #27ae60; --fire: #e74c3c; --earth: #f1c40f; --metal: #95a5a6; --water: #2c3e50; 
            --bg: #f1f2f6; --card-bg: #ffffff;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 850px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: #eee; padding: 20px; border-radius: 15px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
        button { background: #34495e; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; padding: 12px 25px; }
        button:hover { background: #2c3e50; transform: translateY(-2px); }

        .result-grid { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .pillar { border: 1px solid #eee; border-radius: 15px; overflow: hidden; text-align: center; background: #fff; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .p-title { padding: 10px; background: #f8f9fa; font-weight: bold; border-bottom: 1px solid #eee; color: #666; }
        
        .box { padding: 20px 0; font-size: 32px; font-weight: 900; color: white; position: relative; }
        .ss-label { position: absolute; top: 5px; left: 5px; font-size: 12px; opacity: 0.9; font-weight: normal; }
        
        .wood { background-color: var(--wood); }
        .fire { background-color: var(--fire); }
        .earth { background-color: var(--earth); color: #333; }
        .metal { background-color: var(--metal); color: #333; }
        .water { background-color: var(--water); }

        /* 신살 태그 디자인 개선 */
        .info { padding: 12px; font-size: 13px; text-align: left; background: #fafafa; border-top: 1px solid #eee; min-height: 180px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .tag { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; border: 1px solid rgba(0,0,0,0.05); }
        
        .tag-nobility { background-color: #e3f2fd; color: #1976d2; } /* 귀인: 파랑 */
        .tag-energy { background-color: #fff3e0; color: #e65100; }   /* 강한기운: 주황 */
        .tag-sal { background-color: #fce4ec; color: #c2185b; }      /* 일반살: 분홍 */
        .tag-12sal { background-color: #f1f8e9; color: #388e3c; }    /* 12신살: 초록 */
        
        .jijang-box { font-size: 11px; color: #666; background: #eee; padding: 6px; border-radius: 6px; margin: 8px 0; line-height: 1.4; }
        .status-box { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; display: none; width: 100%; box-sizing: border-box; }
        
        @media (max-width: 600px) {
            .result-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <h2 style="text-align: center; margin-bottom: 25px;">Bazi Master Pro <small style="font-size: 0.5em; vertical-align: middle; color: #999;">v2.5</small></h2>
    
    <div class="input-group">
        <input type="datetime-local" id="birth" value="1992-07-23T09:50">
        <select id="gender">
            <option value="M">남성</option>
            <option value="F">여성</option>
        </select>
        <button onclick="startAnalysis()">운명 분석 실행</button>
        <button onclick="saveImage()" style="background:#27ae60;">결과 저장</button>
    </div>

    <div class="result-grid" id="resultGrid">
        <div class="pillar" id="p0"></div>
        <div class="pillar" id="p1"></div>
        <div class="pillar" id="p2"></div>
        <div class="pillar" id="p3"></div>
    </div>

    <div class="status-box" id="statusBox"></div>
</div>

<script src="BaziData.js"></script>
<script src="BaziCore.js"></script>
<script src="BaziInteractions.js"></script>
<script src="BaziMaster.js"></script>

<script>
    async function startAnalysis() {
        const birthValue = document.getElementById('birth').value;
        const gender = document.getElementById('gender').value;

        if(!birthValue) { alert("생년월일을 입력해주세요."); return; }

        const response = await fetch('bazi_data_1900_2100_with_terms.json');
        const baziDataJson = await response.json();

        const date = new Date(birthValue);
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();

        const dayData = baziDataJson[year]?.[month]?.[day];
        if(!dayData) { alert("해당 날짜의 데이터를 찾을 수 없습니다."); return; }

        const parts = dayData.split('|');
        const pillars = [parts[0], parts[1], parts[2], BaziCore.getHourPillar(parts[2][0], date.getHours(), date.getMinutes())];
        const termTime = parts[4]; 

        const analysisResult = BaziMaster.analyze({
            birth: birthValue,
            term: termTime,
            gender: gender,
            pillars: pillars
        });

        renderResult(analysisResult);
    }

    function renderResult(res) {
        const titles = ["년주", "월주", "일주", "시주"];
        
        res.wonkuk.forEach((p, i) => {
            const el = document.getElementById(`p${i}`);
            const ganCol = BaziData.ELEMENTS[p.pillar[0]];
            const zhiCol = BaziData.ELEMENTS[p.pillar[1]];
            const shinsal = res.shinsal[i];

            // 신살 분류 및 태그 생성
            const nobilityTags = shinsal.nobility
                .filter(n => n.includes("귀인") || n.includes("록"))
                .map(n => `<span class="tag tag-nobility">${n}</span>`).join('');
            
            const energyTags = shinsal.energy
                .map(e => `<span class="tag tag-energy">${e}</span>`).join('');

            const salTags = shinsal.nobility
                .filter(n => n.includes("살") && !shinsal.energy.includes(n))
                .map(n => `<span class="tag tag-sal">${n}</span>`).join('');

            // 12신살 (이중 기준 대응: 콤마로 분리)
            const twelveSalTags = shinsal.twelveSal.split(',')
                .map(s => `<span class="tag tag-12sal">${s.trim()}</span>`).join('');

            el.innerHTML = `
                <div class="p-title">${titles[i]}</div>
                <div class="box ${ganCol}">
                    <span class="ss-label">${p.ssGan}</span>
                    ${p.pillar[0]}
                </div>
                <div class="box ${zhiCol}">
                    <span class="ss-label">${p.ssZhi}</span>
                    ${p.pillar[1]}
                </div>
                <div class="info">
                    <strong style="color:#333; font-size:15px;">${p.twelveCycle}</strong> 
                    <span style="font-size:11px; color:#999; display:block;">납음: ${p.naeum}</span>
                    <div class="jijang-box">지장간: ${p.jijang.list.join(', ')}</div>
                    <hr style="border:0; border-top:1px dashed #ddd; margin:10px 0;">
                    <div class="tag-container">
                        ${nobilityTags}
                        ${energyTags}
                        ${salTags}
                        ${twelveSalTags}
                    </div>
                </div>
            `;
        });

        document.getElementById('statusBox').innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <h4 style="margin:0 0 10px 0; color:#444;">기본 정보</h4>
                    • <b>대운수:</b> <span style="color:#2980b9">${res.daewunNum}</span> (${res.metadata.daewunDirection})<br>
                    • <b>공망:</b> <span style="color:#e74c3c">${res.gongmang.join(', ')}</span>
                </div>
                <div>
                    <h4 style="margin:0 0 10px 0; color:#444;">지지 특이관계</h4>
                    ${res.interactions.length > 0 
                        ? res.interactions.map(it => `<span class="tag tag-sal" style="margin-bottom:4px; display:inline-block;">${it}</span>`).join(' ') 
                        : '<span style="color:#999;">특이사항 없음</span>'}
                </div>
            </div>
        `;

        document.getElementById('resultGrid').style.display = 'grid';
        document.getElementById('statusBox').style.display = 'block';
    }

    function saveImage() {
        const area = document.getElementById('captureArea');
        html2canvas(area, { backgroundColor: "#f1f2f6", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Bazi_Analysis_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
