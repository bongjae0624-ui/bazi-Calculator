<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Master Pro - Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --wood: #27ae60; --fire: #e74c3c; --earth: #f1c40f; --metal: #95a5a6; --water: #2c3e50; 
            --bg: #f1f2f6; --card-bg: #ffffff;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 850px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: #eee; padding: 20px; border-radius: 15px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #0984e3; color: white; border: none; cursor: pointer; font-weight: bold; }

        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .pillar { border: 1px solid #ddd; border-radius: 12px; overflow: hidden; text-align: center; background: #fff; }
        .p-title { background: #f8f9fa; padding: 5px; font-weight: bold; font-size: 14px; }
        
        .box { height: 70px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; position: relative; }
        .ss-label { position: absolute; top: 5px; left: 5px; font-size: 11px; opacity: 0.8; }
        
        .wood { background-color: var(--wood); }
        .fire { background-color: var(--fire); }
        .earth { background-color: var(--earth); color: #333; }
        .metal { background-color: var(--metal); color: #333; }
        .water { background-color: var(--water); }

        .info { padding: 10px; font-size: 12px; min-height: 100px; }
        .tag { display: inline-block; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin: 2px; font-weight: bold; border: 1px solid #ddd; }
        .status { margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 10px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <h2 style="text-align: center;">Bazi Master Pro</h2>
    
    <div class="input-group">
        <input type="date" id="birthDate" value="1990-03-15">
        <input type="time" id="birthTime" value="14:30">
        <select id="gender">
            <option value="M">남성</option>
            <option value="F">여성</option>
        </select>
        <button onclick="runAnalysis()">사주 분석 실행</button>
    </div>

    <div id="loader" style="display:none; text-align:center; color:#0984e3;">데이터 분석 중...</div>

    <div class="bazi-grid" id="resultGrid" style="display:none;">
        <div class="pillar" id="p3"></div> <div class="pillar" id="p2"></div> <div class="pillar" id="p1"></div> <div class="pillar" id="p0"></div> </div>

    <div class="status" id="statusBox" style="display:none;"></div>
</div>

<script src="BaziData.js"></script>
<script src="BaziCore.js"></script>
<script src="BaziInteractions.js"></script>
<script src="BaziMaster.js"></script>

<script>
    let db = null;

    // 초기 데이터 로드
    window.onload = async () => {
        try {
            const res = await fetch('bazi_data_1900_2100_with_terms.json');
            db = await res.json();
            console.log("데이터 로드 성공");
        } catch(e) {
            alert("JSON 파일을 불러올 수 없습니다. 서버(Live Server 등)에서 실행해주세요.");
        }
    };

    function runAnalysis() {
        if(!db) return;
        document.getElementById('loader').style.display = 'block';

        const bDate = document.getElementById('birthDate').value; // YYYY-MM-DD
        const bTime = document.getElementById('birthTime').value; // HH:mm
        const gender = document.getElementById('gender').value;

        const [y, m, d] = bDate.split('-').map(Number);
        const [hh, mm] = bTime.split(':').map(Number);

        // 1. JSON에서 팔자 데이터 찾기
        const targetYear = db[y];
        if(!targetYear || !targetYear[m] || !targetYear[m][d]) {
            alert("해당 날짜의 데이터가 없습니다.");
            return;
        }

        const rawStr = targetYear[m][d]; 
        const parts = rawStr.split('|'); // [년, 월, 일, 절입명, 절입시간...]
        
        const pillars = [parts[0], parts[1], parts[2]]; // 년월일
        const hourP = getHourP(pillars[2][0], hh); // 시주 계산
        pillars.push(hourP);

        // 2. BaziMaster 엔진 실행
        const result = BaziMaster.analyze({
            birth: `${bDate} ${bTime}`,
            term: parts[4], 
            gender: gender,
            pillars: pillars
        });

        render(result);
    }

    // 시주 계산 로직
    function getHourP(meG, hr) {
        const GANS = "甲乙丙丁戊己庚辛壬癸";
        const ZHIS = "子丑寅卯辰巳午未申酉戌亥";
        let zI = Math.floor((hr + 1) / 2) % 12;
        const s = {'甲':0,'己':0,'乙':2,'庚':2,'丙':4,'辛':4,'丁':6,'壬':6,'戊':8,'癸':8};
        return GANS[(s[meG] + zI) % 10] + ZHIS[zI];
    }

    function render(res) {
        const titles = ["년주", "월주", "일주", "시주"];
        
        res.wonkuk.forEach((p, i) => {
            const el = document.getElementById(`p${i}`);
            const ganElm = BaziData.ELEMENTS[p.pillar[0]];
            const zhiElm = BaziData.ELEMENTS[p.pillar[1]];
            const shinsal = res.shinsal[i];

            el.innerHTML = `
                <div class="p-title">${titles[i]}</div>
                <div class="box ${ganElm}">
                    <span class="ss-label">${p.ssGan}</span>
                    ${p.pillar[0]}
                </div>
                <div class="box ${zhiElm}">
                    <span class="ss-label">${p.ssZhi}</span>
                    ${p.pillar[1]}
                </div>
                <div class="info">
                    <strong>${p.twelveCycle}</strong><br>
                    <span style="color:#666">${p.naeum}</span><hr>
                    <div style="font-size:10px">지장간: ${p.jijang.list.join(',')}</div>
                    ${shinsal.nobility.map(n => `<span class="tag" style="background:#fff3cd">${n}</span>`).join('')}
                    ${shinsal.energy.map(e => `<span class="tag" style="background:#d1ecf1">${e}</span>`).join('')}
                    <span class="tag" style="background:#f8d7da">${shinsal.twelveSal}</span>
                </div>
            `;
        });

        document.getElementById('statusBox').innerHTML = `
            <b>분석 요약</b><br>
            대운수: ${res.daewunNum} (${res.metadata.daewunDirection}) | 공망: ${res.gongmang.join(', ')}<br>
            특이사항: ${res.interactions.length > 0 ? res.interactions.join(', ') : '없음'}
        `;

        document.getElementById('loader').style.display = 'none';
        document.getElementById('resultGrid').style.display = 'grid';
        document.getElementById('statusBox').style.display = 'block';
    }
</script>

</body>
</html>
