<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Chart Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { max-width: 480px; width: 100%; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        button { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        
        #result { display: none; margin-top: 30px; border-top: 2px solid #f1f1f1; padding-top: 25px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
        .pillar { height: 75px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; color: #fff; font-weight: 700; font-size: 17px; }
        .pillar span { font-size: 9px; font-weight: 400; opacity: 0.8; margin-bottom: 2px; }
        .god { font-size: 10px; font-weight: 700; color: #777; margin-top: 4px; height: 15px; text-transform: uppercase; }
        .luck-wrap { display: flex; overflow-x: auto; gap: 8px; margin-top: 15px; padding-bottom: 10px; }
        .luck-card { min-width: 60px; background: #fdfdfd; padding: 10px 5px; border: 1px solid #f1f1f1; border-radius: 8px; text-align: center; flex-shrink: 0; }
        
        .wood { background: #2ecc71; } .fire { background: #e74c3c; } .earth { background: #f1c40f; color: #333 !important; } .metal { background: #95a5a6; color: #333 !important; } .water { background: #34495e; }
        .master { outline: 3px solid #000; outline-offset: -3px; }
    </style>
</head>
<body>

<div id="app">
    <h2 style="text-align:center; margin-top:0;">Bazi Calculator</h2>
    <div class="input-group">
        <label>Birth Date & Time</label>
        <input type="datetime-local" id="dt">
    </div>
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div style="flex: 1;">
            <label>Gender</label>
            <select id="gen"><option value="1">Male</option><option value="0">Female</option></select>
        </div>
        <div style="flex: 1;">
            <label>Longitude</label>
            <input type="number" id="lon" value="127.0" step="0.1">
        </div>
    </div>
    <button id="run-btn" type="button">GENERATE CHART</button>

    <div id="result">
        <div class="grid">
            <div style="font-size:9px; color:#ccc;">HOUR</div><div style="font-size:9px; color:#ccc;">DAY</div><div style="font-size:9px; color:#ccc;">MONTH</div><div style="font-size:9px; color:#ccc;">YEAR</div>
            <div id="c-h1" class="pillar"></div><div id="c-d1" class="pillar master"></div><div id="c-m1" class="pillar"></div><div id="c-y1" class="pillar"></div>
            <div id="s-h1" class="god"></div><div class="god">SELF</div><div id="s-m1" class="god"></div><div id="s-y1" class="god"></div>
            <div id="c-h2" class="pillar"></div><div id="c-d2" class="pillar"></div><div id="c-m2" class="pillar"></div><div id="c-y2" class="pillar"></div>
            <div id="s-h2" class="god"></div><div id="s-d2" class="god"></div><div id="s-m2" class="god"></div><div id="s-y2" class="god"></div>
        </div>
        <div id="luck-list" class="luck-wrap"></div>
    </div>
</div>
