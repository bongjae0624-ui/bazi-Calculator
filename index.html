<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi Master Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        :root {
            --wood: #27ae60; --fire: #e74c3c; --earth: #f1c40f; 
            --metal: #7f8c8d; --water: #2c3e50; --bg: #f0f2f5;
        }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; padding: 20px; }
        #container { max-width: 500px; width: 100%; background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; letter-spacing: -1px; margin-bottom: 25px; }
        
        .input-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        input { padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #000; outline: none; }
        
        button { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; }
        button:hover { background: #333; }

        #result { display: none; margin-top: 35px; border-top: 2px solid #f9f9f9; padding-top: 25px; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; }
        .label { font-size: 12px; font-weight: bold; color: #bbb; margin-bottom: 8px; }
        
        .cell { height: 90px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 26px; font-weight: 900; position: relative; }
        .master { outline: 4px solid #000; outline-offset: -4px; } /* 일간 강조 */

        /* 오행 색상 */
        .wood { background: var(--wood); }
        .fire { background: var(--fire); }
        .earth { background: var(--earth); color: #333 !important; }
        .metal { background: var(--metal); }
        .water { background: var(--water); }
    </style>
</head>
<body>

<div id="container">
    <h2>BAZI MASTER</h2>
    <div class="input-section">
        <input type="datetime-local" id="birth-dt">
        <button onclick="calculateBazi()">명식 분석하기</button>
    </div>

    <div id="result">
        <div class="bazi-grid">
            <div class="label">시(HOUR)</div><div class="label">일(DAY)</div><div class="label">월(MONTH)</div><div class="label">년(YEAR)</div>
            
            <div id="h-gan" class="cell"></div>
            <div id="d-gan" class="cell master"></div>
            <div id="m-gan" class="cell"></div>
            <div id="y-gan" class="cell"></div>
            
            <div id="h-zhi" class="cell"></div>
            <div id="d-zhi" class="cell"></div>
            <div id="m-zhi" class="cell"></div>
            <div id="y-zhi" class="cell"></div>
        </div>
    </div>
</div>

<script>
// 오행 색상 매핑 표
const COLOR_MAP = {
    '甲':'wood','乙':'wood','寅':'wood','卯':'wood',
    '丙':'fire','丁':'fire','巳':'fire','午':'fire',
    '戊':'earth','己':'earth','辰':'earth','戌':'earth','丑':'earth','未':'earth',
    '庚':'metal','辛':'metal','申':'metal','酉':'metal',
    '壬':'water','癸':'water','亥':'water','子':'water'
};

function calculateBazi() {
    try {
        const dtVal = document.getElementById('birth-dt').value;
        if (!dtVal) return alert("날짜와 시간을 선택해주세요.");

        // 1. 객체 생성 (표준 경로)
        const solar = Solar.fromDate(new Date(dtVal));
        const lunar = solar.getLunar();
        const ba = lunar.getEightChar();

        // 2. 데이터 추출 (가장 안전한 .getXXX() 메서드 사용)
        // 이 메서드들은 "甲子"와 같이 두 글자를 반환하므로 인덱스로 접근합니다.
        const yP = ba.getYear();  
        const mP = ba.getMonth(); 
        const dP = ba.getDay();   
        const hP = ba.getHour();  

        const data = {
            gan: [hP[0], dP[0], mP[0], yP[0]], // 시, 일, 월, 년 천간
            zhi: [hP[1], dP[1], mP[1], yP[1]]  // 시, 일, 월, 년 지지
        };

        // 3. UI 업데이트 로직
        const ids = ['h', 'd', 'm', 'y'];
        
        ids.forEach((prefix, i) => {
            // 천간 업데이트
            const gEl = document.getElementById(`${prefix}-gan`);
            const ganChar = data.gan[i];
            gEl.innerText = ganChar;
            gEl.className = `cell ${COLOR_MAP[ganChar] || ''} ${prefix === 'd' ? 'master' : ''}`;

            // 지지 업데이트
            const zEl = document.getElementById(`${prefix}-zhi`);
            const zhiChar = data.zhi[i];
            zEl.innerText = zhiChar;
            zEl.className = `cell ${COLOR_MAP[zhiChar] || ''}`;
        });

        document.getElementById('result').style.display = 'block';
    } catch (err) {
        console.error(err);
        alert("오류가 발생했습니다. 생년월일을 다시 확인해주세요.");
    }
}
</script>
</body>
</html>
